<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Patas con Lotus 🐾</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root { --primary: #a67c52; --dark: #111; --header-bg: #1a1a1a; --header-text: #f4ece4; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color:white; }
        header { background: var(--header-bg); color: var(--header-text); padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid var(--primary); }
        #header-logo { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        #controls { padding: 12px; display: flex; gap: 8px; background: #222; }
        input, select, textarea { padding: 10px; border-radius: 8px; border: none; background: #333; color: white; width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        button { padding: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; }
        #map { height: 70vh; width: 100%; }
        
        /* Estilos de Opiniones */
        .popup-card { width: 220px; color: white; }
        .popup-card img { width: 100%; border-radius: 8px; height: 120px; object-fit: cover; }
        .rating-input { color: #ffd700; margin-bottom: 10px; display: block; }
        .comment-section { margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        .comment-item { font-size: 11px; background: #333; padding: 5px; border-radius: 4px; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>
    <img id="header-logo" src="logo.png" alt="Lotus">
    <div>De Patas con Lotus</div>
</header>

<div id="controls">
    <input id="search" placeholder="🔍 Buscar...">
    <select id="filter">
        <option value="all">Todo</option>
        <option value="restaurante">Restaurantes</option>
        <option value="salon">Salón de onces</option>
        <option value="tienda">Almacenes mascota</option>
    </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

<script>
// CONFIGURACIÓN FIREBASE (PEGA LA TUYA AQUÍ)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO_ID",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

var map = L.map('map').setView([4.65, -74.06], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

async function cargar() {
    const snapshot = await db.collection("lugares").get();
    snapshot.forEach(doc => {
        const l = doc.data();
        const marker = L.marker([l.lat, l.lng]).addTo(map);
        
        marker.bindPopup(`
            <div class="popup-card">
                <img src="${l.img}">
                <h3>${l.nombre}</h3>
                <p>${l.desc}</p>
                <div class="comment-section">
                    <small>Calificar:</small>
                    <select id="stars-${doc.id}" style="width:60px">
                        <option value="5">⭐⭐⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="3">⭐⭐⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="1">⭐</option>
                    </select>
                    <textarea id="comment-${doc.id}" placeholder="Tu opinión..."></textarea>
                    <button onclick="enviarOpinion('${doc.id}')" style="width:100%">Publicar</button>
                </div>
            </div>
        `);
    });
}

async function enviarOpinion(id) {
    const estrella = document.getElementById(`stars-${id}`).value;
    const comentario = document.getElementById(`comment-${id}`).value;

    if(!comentario) return alert("Escribe algo antes de enviar");

    try {
        await db.collection("lugares").doc(id).collection("opiniones").add({
            puntos: estrella,
            texto: comentario,
            fecha: new Date()
        });
        alert("¡Gracias por tu opinión! 🐾");
        map.closePopup();
    } catch (e) {
        alert("Error al guardar");
    }
}

cargar();
</script>
</body>
</html>
