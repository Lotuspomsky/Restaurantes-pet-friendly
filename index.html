<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>De Patas con Lotus 🐾</title>

    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root { 
            --primary: #a67c52; /* Café del logo */
            --dark: #111; 
            --header-bg: #1a1a1a; /* Fondo oscuro profundo */
            --header-text: #f4ece4; /* Crema del logo */
        }
        body { margin:0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark); color:white; overflow: hidden; }
        
        header { 
            background: var(--header-bg);
            color: var(--header-text);
            padding: 10px 20px;
            text-align: left;
            font-weight: bold; 
            font-size: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid var(--primary);
        }

        #header-logo {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            flex-shrink: 0;
        }

        #controls { 
            padding: 12px; display: flex; gap: 8px; background: #222;
            position: sticky; top: 0; z-index: 1000;
        }

        input, select { 
            padding: 10px; border-radius: 8px; border: none; flex: 1;
            background: #333; color: white; font-size: 14px;
        }

        button { 
            padding: 10px 15px; border: none; border-radius: 8px; 
            background: var(--primary); color: white; cursor: pointer; font-weight: bold;
        }

        #map { height: calc(100vh - 120px); width: 100%; }

        /* Estilos Popup */
        .leaflet-popup-content-wrapper { background: #222; color: white; border-radius: 12px; }
        .popup-card { width: 200px; }
        .popup-card img { width: 100%; border-radius: 8px; height: 120px; object-fit: cover; }
        .popup-card h3 { margin: 8px 0 4px; font-size: 16px; }
        .popup-card p { font-size: 12px; color: #ccc; margin: 4px 0; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-group button { font-size: 12px; padding: 6px; flex: 1; }
        .btn-fav { background: #444; }
    </style>
</head>
<body>

<header>
    <img id="header-logo" src="logo.png" alt="Lotus">
    <div>De Patas con Lotus</div>
</header>

<div id="controls">
    <input id="search" placeholder="🔍 Buscar lugar...">
    <select id="filter">
        <option value="all">Todo</option>
        <option value="restaurante">Restaurantes</option>
        <option value="salon">Salón de onces</option>
        <option value="tienda">Almacenes para mascota</option>
    </select>
    <button onclick="miUbicacion()">📍</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 IMPORTANTE: Pega aquí tus credenciales de Firebase para que funcione el mapa
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO_ID",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

var map = L.map('map').setView([4.65, -74.06], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var markers = [];

async function cargar() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const filtro = document.getElementById("filter").value;
    const texto = document.getElementById("search").value.toLowerCase();

    try {
        const snapshot = await db.collection("lugares").get();
        snapshot.forEach(doc => {
            const l = doc.data();
            
            if ((filtro === "all" || l.tipo === filtro) && 
                l.nombre.toLowerCase().includes(texto)) {

                const marker = L.marker([l.lat, l.lng]).addTo(map);
                
                marker.bindPopup(`
                    <div class="popup-card">
                        <img src="${l.img || 'https://via.placeholder.com/150'}">
                        <h3>${l.nombre}</h3>
                        <p>⭐ ${l.rating || 'N/A'}</p>
                        <p>${l.desc || ''}</p>
                        <div class="btn-group">
                            <button onclick="ir(${l.lat}, ${l.lng})">🧭 Ir</button>
                            <button class="btn-fav" onclick="fav('${doc.id}')">❤️</button>
                        </div>
                    </div>
                `);
                markers.push(marker);
            }
        });
    } catch (error) {
        console.error("Error:", error);
    }
}

function miUbicacion() {
    if (!navigator.geolocation) return alert("GPS no soportado");
    navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        map.setView([latitude, longitude], 15);
        L.marker([latitude, longitude]).addTo(map).bindPopup("¡Estás aquí! 🐾").openPopup();
    });
}

function ir(lat, lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
}

function fav(id) {
    let favs = JSON.parse(localStorage.getItem("favs") || "[]");
    if (!favs.includes(id)) {
        favs.push(id);
        localStorage.setItem("favs", JSON.stringify(favs));
        alert("¡Guardado en favoritos! ❤️");
    }
}

document.getElementById("search").addEventListener("input", cargar);
document.getElementById("filter").addEventListener("change", cargar);

cargar();
</script>
</body>
</html>
