<!DOCTYPE html>
<html>
<head>
    <title>Mis Restaurantes Pet Friendly</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Tu configuración de Firebase (LA QUE COPIAMOS)
        const firebaseConfig = {
            apiKey: "AIzaSyAeNrdtKdWuiKOSkGOFAV2yhAkGTAf8T9s",
            authDomain: "lugares-pet-friendly.firebaseapp.com",
            projectId: "lugares-pet-friendly",
            storageBucket: "lugares-pet-friendly.firebasestorage.app",
            messagingSenderId: "971103728961",
            appId: "1:971103728961:web:b6a2e665ee0ee494e49dc0"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Crear el mapa centrado en Bogotá
        var map = L.map('map').setView([4.65, -74.06], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Función para cargar los lugares desde Firebase
        db.collection("lugares").onSnapshot((querySnapshot) => {
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if (data.lat && data.lng) {
                    L.marker([data.lat, data.lng])
                        .addTo(map)
                        .bindPopup(`<b>${data.nombre}</b><br>${data.tipo}`);
                }
            });
        });
    </script>
</body>
</html>
